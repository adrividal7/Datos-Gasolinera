name: Actualizar Datos Ministerio

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta en el minuto 0 de cada hora
  workflow_dispatch: # Te permite ejecutarlo a mano con un botón

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar requests
        run: pip install requests urllib3

      - name: Ejecutar el Scraper
        run: python scraper.py

      - name: Guardar los nuevos datos en GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add datos.json
          # Si no hay cambios, no hace nada. Si hay, hace el commit.
          git commit -m "🔄 Datos actualizados" || exit 0
          git push
